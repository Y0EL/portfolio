    <text x="100" y="1085" text-anchor="end" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1.5" fill="#6f6c64">2025</text>
    <text x="232" y="1077" font-size="26" fill="#ece6da">Autocrawl</text>
    <text x="232" y="1103" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#b8b3a8">929 VENDORS / 1 NIGHT · 12X THROUGHPUT</text>

