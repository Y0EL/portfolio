    <circle cx="200" cy="630" r="5" fill="#b8b3a8"/>
    <text x="100" y="635" text-anchor="end" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1.5" fill="#6f6c64">2023</text>
    <text x="232" y="627" font-size="26" fill="#ece6da">EFSET C2</text>
    <text x="232" y="653" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#b8b3a8">ENGLISH PROFICIENT LEVEL</text>

