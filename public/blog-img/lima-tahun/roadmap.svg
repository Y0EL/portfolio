<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1280" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Roadmap 2020 to 2026">
  <defs>
    <filter id="g2"><feTurbulence baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" seed="5"/><feColorMatrix values="0 0 0 0 0.9  0 0 0 0 0.85  0 0 0 0 0.78  0 0 0 0.03 0"/></filter>
  </defs>

  <rect width="1280" height="1280" fill="#0c0c0b"/>
  <rect width="1280" height="1280" filter="url(#g2)" opacity="0.7"/>
  <rect x="24" y="24" width="1232" height="1232" fill="none" stroke="rgba(236,230,218,0.10)"/>

  <!-- header -->
  <g transform="translate(72, 72)">
    <text font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#6f6c64">§ROADMAP · 2020 → 2026</text>
    <text y="56" font-family="Georgia, serif" font-style="italic" font-size="56" fill="#e8512a">The ledger,</text>
    <text y="112" font-family="Georgia, serif" font-size="56" fill="#ece6da">year by year<tspan fill="#e8512a">.</tspan></text>
  </g>

  <line x1="72" y1="220" x2="1208" y2="220" stroke="rgba(236,230,218,0.18)"/>

  <!-- timeline rail -->
  <line x1="200" y1="260" x2="200" y2="1200" stroke="rgba(236,230,218,0.18)" stroke-width="1"/>

  <!-- ROW HELPER · each milestone is y, year (mono), title (serif), tag (mono), color hint -->
  <g font-family="Georgia, serif">

    <!-- 2020 Cubicube -->
    <circle cx="200" cy="280" r="5" fill="#b8b3a8"/>
    <text x="100" y="285" text-anchor="end" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1.5" fill="#6f6c64">2020</text>
    <text x="232" y="277" font-size="26" fill="#ece6da">Cubicube debut</text>
    <text x="232" y="303" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#b8b3a8">SPOTIFY · MUSIK MULAI</text>

    <!-- 2020 GhibranTravel -->
    <circle cx="200" cy="350" r="5" fill="#b8b3a8"/>
    <text x="100" y="355" text-anchor="end" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1.5" fill="#6f6c64">2020</text>
    <text x="232" y="347" font-size="26" fill="#ece6da">GhibranTravel</text>
    <text x="232" y="373" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#b8b3a8">FRONTEND DEVELOPER · REACT</text>

    <!-- 2021 Sekriptor -->
    <circle cx="200" cy="420" r="5" fill="#b8b3a8"/>
    <text x="100" y="425" text-anchor="end" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1.5" fill="#6f6c64">2021</text>
    <text x="232" y="417" font-size="26" fill="#ece6da">Sekriptor</text>
    <text x="232" y="443" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#b8b3a8">ZERO CODE AI SCRIPT TOOL</text>

    <!-- 2022 ZANDO -->
    <circle cx="200" cy="490" r="5" fill="#b8b3a8"/>
    <text x="100" y="495" text-anchor="end" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1.5" fill="#6f6c64">2022</text>
    <text x="232" y="487" font-size="26" fill="#ece6da">ZANDO Agency</text>
    <text x="232" y="513" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#b8b3a8">AI SPECIALIST · INTERNAL TOOLS</text>

