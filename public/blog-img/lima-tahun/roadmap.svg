    <circle cx="200" cy="770" r="7" fill="#e8512a"/>
    <text x="100" y="775" text-anchor="end" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1.5" fill="#6f6c64">2024</text>
    <text x="232" y="767" font-size="26" fill="#ece6da" font-style="italic">ReUse · founded</text>
    <text x="232" y="793" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#e8512a">VEBETTERDAO FUNDED · CO FOUNDER · CTO</text>

