    <text x="100" y="1155" text-anchor="end" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1.5" fill="#6f6c64">2025</text>
    <text x="232" y="1147" font-size="26" fill="#ece6da">Atlas · Geocek · Sentinel</text>
    <text x="232" y="1173" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#b8b3a8">VOICE AI · OSINT · ANTIFRAUD</text>

    <!-- 2026 YOTA + 164 lamaran + Field Dispatch -->
    <circle cx="200" cy="1220" r="5" fill="#b8b3a8"/>
    <text x="100" y="1225" text-anchor="end" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1.5" fill="#6f6c64">2026</text>
    <text x="232" y="1217" font-size="26" fill="#ece6da">YOTA · Field Dispatch · 164 lamaran</text>
    <text x="232" y="1243" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#b8b3a8">MEETING AI · PORTFOLIO · JOB AUTOMATION</text>

