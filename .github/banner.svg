<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Yoel Andreas Manoppo · Field Dispatch">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1410" stop-opacity="0.42"/>
      <stop offset="0.55" stop-color="#0c0c0b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ember-wash" cx="50%" cy="0%" r="65%">
      <stop offset="0" stop-color="#e8512a" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0c0c0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.92  0 0 0 0 0.88  0 0 0 0 0.78  0 0 0 0.04 0"/>
    </filter>
  </defs>

  <!-- Base layers -->
  <rect width="1280" height="480" fill="#0c0c0b"/>
  <rect width="1280" height="480" fill="url(#ember-wash)"/>
  <rect width="1280" height="480" fill="url(#warm)"/>
  <rect width="1280" height="480" filter="url(#grain)" opacity="0.7"/>

  <!-- Inner hairline -->
  <rect x="24" y="24" width="1232" height="432" fill="none" stroke="rgba(236,230,218,0.10)" stroke-width="1"/>

  <!-- TOP KICKER ROW -->
  <g transform="translate(64, 64)">
    <!-- Signal dot with pulse -->
    <g>
      <circle cx="6" cy="6" r="14" fill="#e8512a" opacity="0.35">
        <animate attributeName="r" values="6;18;6" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0;0.5" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="6" cy="6" r="6" fill="#e8512a"/>
    </g>
    <text x="30" y="11" font-family="ui-monospace, 'JetBrains Mono', 'Menlo', monospace" font-size="11" letter-spacing="2.2" fill="#ece6da" font-weight="600">LIVE</text>
    <text x="84" y="11" font-family="ui-monospace, 'JetBrains Mono', 'Menlo', monospace" font-size="11" letter-spacing="2.2" fill="#6f6c64" font-weight="500">FIELD DISPATCH №017 · JAKARTA · 2026</text>
  </g>

  <!-- TOP-RIGHT MASTHEAD -->
  <g transform="translate(1216, 75)" text-anchor="end">
    <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="2.2" fill="#6f6c64" font-weight="500">ON THE RECORD</text>
  </g>

  <!-- HERO DISPLAY -->
  <g transform="translate(64, 200)">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="116" font-weight="400" letter-spacing="-2.6" fill="#ece6da">Building agents</text>
    <g transform="translate(0, 116)">
      <text font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="116" font-weight="400" letter-spacing="-2.6" fill="#ece6da">for the <tspan fill="#e8512a">state</tspan><tspan fill="#e8512a">.</tspan></text>
    </g>
  </g>

  <!-- Subtitle -->
  <g transform="translate(64, 370)">
    <text font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="400" fill="#b8b3a8">
      <tspan fill="#ece6da" font-weight="500">Yoel Andreas Manoppo</tspan>
      <tspan dx="14" fill="#6f6c64">·</tspan>
      <tspan dx="14">AI Forward Deployed Engineer</tspan>
      <tspan dx="14" fill="#6f6c64">·</tspan>
      <tspan dx="14">UI Specialist</tspan>
    </text>
  </g>

  <!-- Hairline divider -->
  <line x1="64" y1="404" x2="1216" y2="404" stroke="rgba(236,230,218,0.18)" stroke-width="1"/>

  <!-- STAT LEDGER -->
  <g transform="translate(64, 440)" font-family="ui-monospace, 'JetBrains Mono', monospace">
    <!-- 03 -->
    <text x="0" y="0" font-size="26" font-weight="600" fill="#ece6da" letter-spacing="0.5">03</text>
    <text x="60" y="-12" font-size="9" letter-spacing="1.6" font-weight="500" fill="#6f6c64">YEARS</text>
    <text x="60" y="0" font-size="9" letter-spacing="1.6" font-weight="500" fill="#6f6c64">SHIPPING</text>

    <!-- 12 -->
    <text x="290" y="0" font-size="26" font-weight="600" fill="#ece6da" letter-spacing="0.5">12</text>
    <text x="350" y="-12" font-size="9" letter-spacing="1.6" font-weight="500" fill="#6f6c64">SPECIMENS</text>
    <text x="350" y="0" font-size="9" letter-spacing="1.6" font-weight="500" fill="#6f6c64">SHIPPED</text>

    <!-- 40+ -->
    <text x="580" y="0" font-size="26" font-weight="600" fill="#ece6da" letter-spacing="0.5">40+</text>
    <text x="650" y="-12" font-size="9" letter-spacing="1.6" font-weight="500" fill="#6f6c64">PUBLIC</text>
    <text x="650" y="0" font-size="9" letter-spacing="1.6" font-weight="500" fill="#6f6c64">REPOS</text>

    <!-- 929 -->
    <text x="870" y="0" font-size="26" font-weight="600" fill="#ece6da" letter-spacing="0.5">929</text>
    <text x="940" y="-12" font-size="9" letter-spacing="1.6" font-weight="500" fill="#6f6c64">VENDORS</text>
    <text x="940" y="0" font-size="9" letter-spacing="1.6" font-weight="500" fill="#6f6c64">/ 1 NIGHT</text>
  </g>
</svg>
