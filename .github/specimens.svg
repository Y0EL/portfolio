    <text x="78" y="-6" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.8" fill="#6f6c64">SPECIMENS</text>
    <text x="78" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="32" fill="#ece6da">Featured work<tspan fill="#e8512a">.</tspan></text>
  </g>

  <line x1="64" y1="140" x2="1216" y2="140" stroke="rgba(236,230,218,0.10)" stroke-width="1"/>

