<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Featured Specimens">
  <defs>
    <filter id="grain2" x="0" y="0" width="100%" height="100%">
      <feTurbulence baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.92  0 0 0 0 0.88  0 0 0 0 0.78  0 0 0 0.03 0"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="#0c0c0b"/>
  <rect width="1280" height="360" filter="url(#grain2)" opacity="0.7"/>
  <rect x="24" y="24" width="1232" height="312" fill="none" stroke="rgba(236,230,218,0.10)" stroke-width="1"/>

  <!-- Section header -->
  <g transform="translate(64, 64)">
