    <circle cx="40" cy="70" r="2.2"/>
    <circle cx="22" cy="40" r="2.2"/>
    <circle cx="58" cy="40" r="2.2"/>
    <line x1="40" y1="40" x2="14" y2="20"/>
    <line x1="40" y1="40" x2="66" y2="18"/>
    <line x1="40" y1="40" x2="14" y2="60"/>
    <line x1="40" y1="40" x2="68" y2="58"/>
